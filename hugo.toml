baseURL = "https://vape-review.pages.dev/"
title = "VapeMaster - 电子烟专业测评"
theme = ["FixIt"]
defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"
languageName = "简体中文"
hasCJKLanguage = true

# 基础设置
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

[frontmatter]
  lastmod = ["lastmod", ":git", ":fileModTime", ":default"]

[params]
  version = "0.4.X"
  description = "专业的电子烟产品参数与深度测评，涵盖 ICEMAX、LAMI 等主流品牌。"
  keywords = ["电子烟", "Vape", "测评", "参数", "ICEMAX", "LAMI"]
  defaultTheme = "auto"
  
  # --- 首页与列表优化 ---
  summaryLength = 100
  summaryPlainify = true

  # --- 首页 Banner (Profile) 配置 ---
  [params.home.profile]
    enable = true
    avatarURL = "/images/banner.jpg" # 建议图片比例为长条形，避免拉伸
    title = "VapeMaster 专业测评"
    subtitle = "提供最精准的电子烟产品数据"
    typeit = true
    social = true
    # 缩小 Banner 的垂直间距
    disclaimer = "<style>.home-profile { padding: 40px 20px !important; min-height: auto !important; }</style>"

  # --- 页眉配置 ---
  [params.header]
    desktopMode = "sticky"
    [params.header.title]
      name = "VapeMaster"
      pre = "<i class='fa-solid fa-wind'></i>"

  # --- 文章内页功能 (含自动推荐) ---
  [params.page]
    featuredImage = true
    [params.page.related]
      enable = true
      count = 5 # 自动在文末推荐 5 篇相关品牌文章

  # --- 搜索配置 ---
  [params.search]
    enable = true
    type = "fuse"

# --- 导航菜单 ---
[[menu.main]]
  identifier = "posts"
  pre = "<i class='fa-solid fa-pen-fancy fa-fw'></i>"
  name = "测评文章"
  url = "/posts/"
  weight = 1

[[menu.main]]
  identifier = "categories"
  pre = "<i class='fa-solid fa-folder-tree fa-fw'></i>"
  name = "品牌分类"
  url = "/categories/"
  weight = 2

[[menu.main]]
  identifier = "archives"
  pre = "<i class='fa-solid fa-box-archive fa-fw'></i>"
  name = "归档"
  url = "/archives/"
  weight = 3

[outputs]
  home = ["html", "rss", "archives", "search"]